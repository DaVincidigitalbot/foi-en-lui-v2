<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trust - Foi en Lui</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 4500px;
            height: 5400px;
            background-color: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .design-container {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .main-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 680px;
            font-weight: 400;
            color: #FFFFFF;
            text-align: center;
            line-height: 0.8;
            position: relative;
            z-index: 3;
            letter-spacing: 20px;
            text-transform: uppercase;
            text-shadow: 
                6px 6px 0px rgba(255,255,255,0.1),
                12px 12px 6px rgba(0,0,0,0.8),
                -3px -3px 0px rgba(255,255,255,0.05),
                0px 18px 12px rgba(0,0,0,0.6),
                0px 0px 60px rgba(255,255,255,0.15);
            background-image: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 8px,
                rgba(255,255,255,0.04) 8px,
                rgba(255,255,255,0.04) 16px
            );
            -webkit-background-clip: text;
            filter: contrast(1.5) brightness(1.05);
        }
        
        .verse-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 160px;
            font-weight: 400;
            color: #E0E0E0;
            text-align: center;
            line-height: 1.3;
            position: absolute;
            bottom: 800px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 4000px;
            z-index: 2;
            text-shadow: 
                2px 2px 0px rgba(0,0,0,0.7),
                4px 4px 3px rgba(0,0,0,0.5),
                0px 4px 4px rgba(0,0,0,0.3);
        }
        
        .shield {
            position: absolute;
            right: 400px;
            top: 1200px;
            width: 240px;
            height: 280px;
            z-index: 4;
        }
        
        .shield-bg {
            fill: #FFFFFF;
            stroke: #C9A84C;
            stroke-width: 6;
            filter: drop-shadow(4px 4px 8px rgba(0,0,0,0.7));
        }
        
        .shield-cross-v {
            fill: #C9A84C;
        }
        
        .shield-cross-h {
            fill: #C9A84C;
        }
        
        .shield-letters {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            font-weight: bold;
            fill: #000000;
        }
        
        .streetwear-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            z-index: 1;
        }
        
        .grid-line {
            stroke: #FFFFFF;
            stroke-width: 4;
            fill: none;
        }
        
        .impact-accent {
            position: absolute;
            top: 50%;
            left: 200px;
            transform: translateY(-50%);
            width: 60px;
            height: 800px;
            background: linear-gradient(180deg, 
                rgba(255,255,255,0.15) 0%, 
                rgba(255,255,255,0.05) 50%, 
                rgba(255,255,255,0.15) 100%);
            z-index: 1;
        }
        
        .impact-accent-2 {
            position: absolute;
            top: 50%;
            right: 200px;
            transform: translateY(-50%);
            width: 60px;
            height: 800px;
            background: linear-gradient(180deg, 
                rgba(255,255,255,0.15) 0%, 
                rgba(255,255,255,0.05) 50%, 
                rgba(255,255,255,0.15) 100%);
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="design-container">
        <!-- Streetwear-style grid -->
        <svg class="streetwear-grid" viewBox="0 0 450 540" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
                    <path class="grid-line" d="M 50 0 L 0 0 0 50"/>
                </pattern>
            </defs>
            <rect width="100%" height="100%" fill="url(#grid)"/>
        </svg>
        
        <!-- Impact accent bars -->
        <div class="impact-accent"></div>
        <div class="impact-accent-2"></div>
        
        <!-- Foi en Lui Shield Logo -->
        <svg class="shield" viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg">
            <path class="shield-bg" d="M10 20 Q10 10 20 10 L100 10 Q110 10 110 20 L110 80 Q110 90 105 95 L65 130 Q60 135 60 135 Q60 135 55 130 L15 95 Q10 90 10 80 Z"/>
            <rect class="shield-cross-v" x="55" y="25" width="10" height="40"/>
            <rect class="shield-cross-h" x="40" y="40" width="40" height="10"/>
            <text class="shield-letters" x="30" y="85">F</text>
            <text class="shield-letters" x="55" y="85">E</text>
            <text class="shield-letters" x="80" y="85">L</text>
        </svg>
        
        <!-- Main text -->
        <div class="main-text">
            TRUST
        </div>
        
        <!-- Bible verse -->
        <div class="verse-text">
            "Trust in the Lord with all your heart"<br>
            <span style="font-size: 120px; opacity: 0.8; font-weight: 600;">— Proverbs 3:5</span>
        </div>
    </div>
</body>
</html>
