<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Things - Foi en Lui</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 4500px;
            height: 5400px;
            background-color: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .design-container {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .main-text {
            font-family: 'Anton', sans-serif;
            font-size: 520px;
            font-weight: 400;
            color: #FFFFFF;
            text-align: center;
            line-height: 0.75;
            position: relative;
            z-index: 3;
            letter-spacing: -8px;
            text-transform: uppercase;
            text-shadow: 
                4px 4px 0px rgba(255,255,255,0.1),
                8px 8px 4px rgba(0,0,0,0.8),
                -2px -2px 0px rgba(255,255,255,0.05),
                0px 12px 8px rgba(0,0,0,0.6),
                0px 0px 40px rgba(255,255,255,0.2);
            background-image: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 6px,
                rgba(255,255,255,0.03) 6px,
                rgba(255,255,255,0.03) 12px
            );
            -webkit-background-clip: text;
            filter: contrast(1.4) brightness(1.1);
        }
        
        .verse-text {
            font-family: 'Oswald', sans-serif;
            font-size: 180px;
            font-weight: 400;
            color: #E8E8E8;
            text-align: center;
            line-height: 1.2;
            position: absolute;
            bottom: 600px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 4200px;
            z-index: 2;
            text-shadow: 
                2px 2px 0px rgba(0,0,0,0.8),
                4px 4px 2px rgba(0,0,0,0.6),
                0px 4px 3px rgba(0,0,0,0.4);
            letter-spacing: 2px;
        }
        
        .shield-sleeve {
            position: absolute;
            left: 200px;
            top: 1800px;
            width: 300px;
            height: 350px;
            z-index: 4;
            transform: rotate(-25deg);
        }
        
        .shield-bg {
            fill: #FFFFFF;
            stroke: #C9A84C;
            stroke-width: 8;
            filter: drop-shadow(6px 6px 12px rgba(0,0,0,0.8));
        }
        
        .shield-cross-v {
            fill: #C9A84C;
        }
        
        .shield-cross-h {
            fill: #C9A84C;
        }
        
        .shield-letters {
            font-family: 'Anton', sans-serif;
            font-size: 36px;
            font-weight: bold;
            fill: #000000;
        }
        
        .power-lines {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 4400px;
            height: 5200px;
            opacity: 0.04;
            z-index: 1;
        }
        
        .power-line {
            stroke: #FFFFFF;
            stroke-width: 12;
            fill: none;
            stroke-linecap: round;
        }
        
        .strength-symbol {
            position: absolute;
            top: 50%;
            right: 300px;
            transform: translateY(-50%);
            font-family: 'Anton', sans-serif;
            font-size: 1200px;
            font-weight: 400;
            color: #FFFFFF;
            opacity: 0.03;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="design-container">
        <!-- Power/strength background lines -->
        <svg class="power-lines" viewBox="0 0 440 520" xmlns="http://www.w3.org/2000/svg">
            <line class="power-line" x1="0" y1="100" x2="440" y2="120"/>
            <line class="power-line" x1="0" y1="200" x2="440" y2="180"/>
            <line class="power-line" x1="0" y1="300" x2="440" y2="320"/>
            <line class="power-line" x1="0" y1="400" x2="440" y2="380"/>
            <line class="power-line" x1="50" y1="0" x2="80" y2="520"/>
            <line class="power-line" x1="150" y1="0" x2="180" y2="520"/>
            <line class="power-line" x1="250" y1="0" x2="280" y2="520"/>
            <line class="power-line" x1="350" y1="0" x2="380" y2="520"/>
        </svg>
        
        <!-- Strength symbol background -->
        <div class="strength-symbol">†</div>
        
        <!-- Foi en Lui Shield Logo (sleeve placement) -->
        <svg class="shield-sleeve" viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg">
            <path class="shield-bg" d="M10 20 Q10 10 20 10 L100 10 Q110 10 110 20 L110 80 Q110 90 105 95 L65 130 Q60 135 60 135 Q60 135 55 130 L15 95 Q10 90 10 80 Z"/>
            <rect class="shield-cross-v" x="55" y="25" width="10" height="40"/>
            <rect class="shield-cross-h" x="40" y="40" width="40" height="10"/>
            <text class="shield-letters" x="30" y="85">F</text>
            <text class="shield-letters" x="55" y="85">E</text>
            <text class="shield-letters" x="80" y="85">L</text>
        </svg>
        
        <!-- Main text -->
        <div class="main-text">
            ALL<br>THINGS
        </div>
        
        <!-- Bible verse -->
        <div class="verse-text">
            "I can do all things through Christ<br>who strengthens me"<br>
            <span style="font-size: 140px; opacity: 0.8; font-weight: 600; letter-spacing: 1px;">— Philippians 4:13</span>
        </div>
    </div>
</body>
</html>
