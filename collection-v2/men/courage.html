<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courage - Foi en Lui</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 4500px;
            height: 5400px;
            background-color: #3D3D3D;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .design-container {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .main-text {
            font-family: 'Orbitron', monospace;
            font-size: 520px;
            font-weight: 700;
            color: #F8F8F8;
            text-align: center;
            line-height: 0.85;
            position: relative;
            z-index: 3;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 
                4px 4px 0px rgba(0,0,0,0.8),
                8px 8px 4px rgba(0,0,0,0.6),
                -2px -2px 0px rgba(255,255,255,0.2),
                0px 12px 8px rgba(0,0,0,0.5),
                0px 0px 40px rgba(248,248,248,0.2);
            background-image: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 6px,
                rgba(255,255,255,0.04) 6px,
                rgba(255,255,255,0.04) 12px
            );
            -webkit-background-clip: text;
            filter: contrast(1.4) brightness(1.05);
        }
        
        .verse-text {
            font-family: 'Rajdhani', sans-serif;
            font-size: 180px;
            font-weight: 400;
            color: #E8E8E8;
            text-align: center;
            line-height: 1.2;
            position: absolute;
            bottom: 700px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 4000px;
            z-index: 2;
            text-shadow: 
                2px 2px 0px rgba(0,0,0,0.8),
                4px 4px 2px rgba(0,0,0,0.6),
                0px 4px 3px rgba(0,0,0,0.4);
        }
        
        .shield {
            position: absolute;
            left: 400px;
            top: 1600px;
            width: 280px;
            height: 320px;
            z-index: 4;
        }
        
        .shield-bg {
            fill: #F8F8F8;
            stroke: #C9A84C;
            stroke-width: 8;
            filter: drop-shadow(6px 6px 12px rgba(0,0,0,0.5));
        }
        
        .shield-cross-v { fill: #C9A84C; }
        .shield-cross-h { fill: #C9A84C; }
        .shield-letters {
            font-family: 'Orbitron', monospace;
            font-size: 32px;
            font-weight: bold;
            fill: #3D3D3D;
        }
        
        .military-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.04;
            z-index: 1;
        }
        
        .grid-line {
            stroke: #F8F8F8;
            stroke-width: 6;
            fill: none;
        }
        
        .tactical-elements {
            position: absolute;
            top: 50%;
            right: 300px;
            transform: translateY(-50%);
            width: 400px;
            height: 600px;
            opacity: 0.08;
            z-index: 1;
        }
        
        .tactical-line {
            stroke: #F8F8F8;
            stroke-width: 8;
            fill: none;
            stroke-linecap: round;
        }
    </style>
</head>
<body>
    <div class="design-container">
        <!-- Military-style grid -->
        <svg class="military-grid" viewBox="0 0 450 540" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <pattern id="militaryGrid" width="60" height="60" patternUnits="userSpaceOnUse">
                    <path class="grid-line" d="M 60 0 L 0 0 0 60"/>
                </pattern>
            </defs>
            <rect width="100%" height="100%" fill="url(#militaryGrid)"/>
        </svg>
        
        <!-- Tactical elements -->
        <svg class="tactical-elements" viewBox="0 0 120 180" xmlns="http://www.w3.org/2000/svg">
            <line class="tactical-line" x1="20" y1="40" x2="100" y2="40"/>
            <line class="tactical-line" x1="20" y1="90" x2="100" y2="90"/>
            <line class="tactical-line" x1="20" y1="140" x2="100" y2="140"/>
            <polygon class="tactical-line" points="60,10 70,30 50,30" stroke-width="6"/>
            <polygon class="tactical-line" points="60,170 70,150 50,150" stroke-width="6"/>
        </svg>
        
        <!-- Foi en Lui Shield Logo -->
        <svg class="shield" viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg">
            <path class="shield-bg" d="M10 20 Q10 10 20 10 L100 10 Q110 10 110 20 L110 80 Q110 90 105 95 L65 130 Q60 135 60 135 Q60 135 55 130 L15 95 Q10 90 10 80 Z"/>
            <rect class="shield-cross-v" x="55" y="25" width="10" height="40"/>
            <rect class="shield-cross-h" x="40" y="40" width="40" height="10"/>
            <text class="shield-letters" x="30" y="85">F</text>
            <text class="shield-letters" x="55" y="85">E</text>
            <text class="shield-letters" x="80" y="85">L</text>
        </svg>
        
        <!-- Main text -->
        <div class="main-text">
            COURAGE
        </div>
        
        <!-- Bible verse -->
        <div class="verse-text">
            "Be strong and courageous.<br>Do not be afraid."<br>
            <span style="font-size: 140px; opacity: 0.8; font-weight: 600;">— Joshua 1:9</span>
        </div>
    </div>
</body>
</html>
