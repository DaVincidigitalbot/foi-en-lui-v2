<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be Still - Foi en Lui</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 4500px;
            height: 5400px;
            background-color: #F5F0E8;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .design-container {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .main-text {
            font-family: 'Inter', sans-serif;
            font-size: 480px;
            font-weight: 900;
            color: #1a1a2e;
            text-align: center;
            line-height: 0.8;
            position: relative;
            z-index: 3;
            letter-spacing: -12px;
            text-transform: uppercase;
            text-shadow: 
                3px 3px 0px rgba(0,0,0,0.8),
                6px 6px 3px rgba(0,0,0,0.6),
                -2px -2px 0px rgba(255,255,255,0.2),
                0px 8px 6px rgba(0,0,0,0.3);
            background-image: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 4px,
                rgba(0,0,0,0.05) 4px,
                rgba(0,0,0,0.05) 8px
            );
            -webkit-background-clip: text;
            filter: contrast(1.3);
        }
        
        .verse-text {
            font-family: 'Crimson Text', serif;
            font-size: 220px;
            font-weight: 400;
            color: #2a2a3e;
            text-align: center;
            line-height: 1.1;
            position: absolute;
            bottom: 600px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 4000px;
            z-index: 2;
            font-style: italic;
            text-shadow: 
                2px 2px 0px rgba(0,0,0,0.4),
                4px 4px 2px rgba(0,0,0,0.2),
                0px 4px 3px rgba(0,0,0,0.15);
        }
        
        .shield {
            position: absolute;
            right: 300px;
            bottom: 800px;
            width: 300px;
            height: 350px;
            z-index: 4;
        }
        
        .shield-bg {
            fill: #1a1a2e;
            stroke: #C9A84C;
            stroke-width: 8;
            filter: drop-shadow(6px 6px 12px rgba(0,0,0,0.4));
        }
        
        .shield-cross-v {
            fill: #C9A84C;
        }
        
        .shield-cross-h {
            fill: #C9A84C;
        }
        
        .shield-letters {
            font-family: 'Inter', sans-serif;
            font-size: 36px;
            font-weight: bold;
            fill: #C9A84C;
        }
        
        .minimalist-lines {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 4200px;
            height: 4800px;
            opacity: 0.06;
            z-index: 1;
        }
        
        .line {
            stroke: #1a1a2e;
            stroke-width: 4;
            fill: none;
            stroke-linecap: round;
        }
        
        .ampersand {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Crimson Text', serif;
            font-size: 800px;
            font-weight: 400;
            color: #1a1a2e;
            opacity: 0.12;
            z-index: 1;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="design-container">
        <!-- Minimalist background lines -->
        <svg class="minimalist-lines" viewBox="0 0 420 480" xmlns="http://www.w3.org/2000/svg">
            <line class="line" x1="0" y1="240" x2="420" y2="240"/>
            <line class="line" x1="210" y1="0" x2="210" y2="480"/>
            <line class="line" x1="0" y1="120" x2="420" y2="120"/>
            <line class="line" x1="0" y1="360" x2="420" y2="360"/>
            <line class="line" x1="105" y1="0" x2="105" y2="480"/>
            <line class="line" x1="315" y1="0" x2="315" y2="480"/>
        </svg>
        
        <!-- Large ampersand background element -->
        <div class="ampersand">&</div>
        
        <!-- Foi en Lui Shield Logo -->
        <svg class="shield" viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg">
            <path class="shield-bg" d="M10 20 Q10 10 20 10 L100 10 Q110 10 110 20 L110 80 Q110 90 105 95 L65 130 Q60 135 60 135 Q60 135 55 130 L15 95 Q10 90 10 80 Z"/>
            <rect class="shield-cross-v" x="55" y="25" width="10" height="40"/>
            <rect class="shield-cross-h" x="40" y="40" width="40" height="10"/>
            <text class="shield-letters" x="30" y="85">F</text>
            <text class="shield-letters" x="55" y="85">E</text>
            <text class="shield-letters" x="80" y="85">L</text>
        </svg>
        
        <!-- Main text -->
        <div class="main-text">
            BE<br>STILL
        </div>
        
        <!-- Bible verse -->
        <div class="verse-text">
            "Be still, and know that I am God"<br>
            <span style="font-size: 180px; opacity: 0.7; font-style: normal; font-weight: 600;">— Psalm 46:10</span>
        </div>
    </div>
</body>
</html>
