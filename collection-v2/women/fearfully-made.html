<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fearfully Made - Foi en Lui</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 4500px;
            height: 5400px;
            background-color: #8B9A6B;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .design-container {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .main-text {
            font-family: 'Great Vibes', cursive;
            font-size: 340px;
            font-weight: 400;
            color: #F5F0E8;
            text-align: center;
            line-height: 0.85;
            position: relative;
            z-index: 3;
            text-shadow: 
                3px 3px 0px rgba(0,0,0,0.6),
                6px 6px 3px rgba(0,0,0,0.4),
                -2px -2px 0px rgba(255,255,255,0.2),
                0px 8px 6px rgba(0,0,0,0.3),
                0px 0px 30px rgba(245,240,232,0.3);
            background-image: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 4px,
                rgba(255,255,255,0.06) 4px,
                rgba(255,255,255,0.06) 8px
            );
            -webkit-background-clip: text;
            filter: contrast(1.3);
        }
        
        .verse-text {
            font-family: 'Libre Baskerville', serif;
            font-size: 180px;
            font-weight: 400;
            color: #F8F5F0;
            text-align: center;
            line-height: 1.2;
            position: absolute;
            bottom: 700px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 3800px;
            z-index: 2;
            text-shadow: 
                2px 2px 0px rgba(0,0,0,0.5),
                4px 4px 2px rgba(0,0,0,0.3),
                0px 4px 3px rgba(0,0,0,0.2);
        }
        
        .cross-element {
            position: absolute;
            right: 400px;
            top: 1000px;
            width: 300px;
            height: 400px;
            z-index: 4;
        }
        
        .cross-main {
            fill: #F5F0E8;
            filter: drop-shadow(6px 6px 12px rgba(0,0,0,0.4));
        }
        
        .cross-accent {
            fill: #C9A84C;
        }
        
        .shield {
            position: absolute;
            left: 300px;
            bottom: 600px;
            width: 200px;
            height: 240px;
            z-index: 4;
        }
        
        .shield-bg {
            fill: #F5F0E8;
            stroke: #C9A84C;
            stroke-width: 6;
            filter: drop-shadow(4px 4px 8px rgba(0,0,0,0.3));
        }
        
        .shield-cross-v { fill: #C9A84C; }
        .shield-cross-h { fill: #C9A84C; }
        .shield-letters {
            font-family: 'Libre Baskerville', serif;
            font-size: 24px;
            font-weight: bold;
            fill: #8B9A6B;
        }
        
        .botanical-pattern {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 4200px;
            height: 5000px;
            opacity: 0.06;
            z-index: 1;
        }
        
        .botanical-element {
            stroke: #F5F0E8;
            stroke-width: 6;
            fill: none;
            stroke-linecap: round;
        }
    </style>
</head>
<body>
    <div class="design-container">
        <!-- Botanical background pattern -->
        <svg class="botanical-pattern" viewBox="0 0 420 500" xmlns="http://www.w3.org/2000/svg">
            <path class="botanical-element" d="M50 100 Q100 80 150 100 Q200 120 250 100 Q300 80 350 100"/>
            <path class="botanical-element" d="M50 200 Q100 180 150 200 Q200 220 250 200 Q300 180 350 200"/>
            <path class="botanical-element" d="M50 300 Q100 280 150 300 Q200 320 250 300 Q300 280 350 300"/>
            <path class="botanical-element" d="M50 400 Q100 380 150 400 Q200 420 250 400 Q300 380 350 400"/>
            <circle cx="100" cy="150" r="15" class="botanical-element"/>
            <circle cx="200" cy="250" r="20" class="botanical-element"/>
            <circle cx="300" cy="350" r="15" class="botanical-element"/>
        </svg>
        
        <!-- Decorative Cross Element -->
        <svg class="cross-element" viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg">
            <rect class="cross-main" x="50" y="20" width="20" height="120"/>
            <rect class="cross-main" x="20" y="60" width="80" height="20"/>
            <rect class="cross-accent" x="54" y="24" width="12" height="112"/>
            <rect class="cross-accent" x="24" y="64" width="72" height="12"/>
            <circle cx="60" cy="80" r="8" class="cross-accent"/>
        </svg>
        
        <!-- Foi en Lui Shield Logo -->
        <svg class="shield" viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg">
            <path class="shield-bg" d="M10 20 Q10 10 20 10 L100 10 Q110 10 110 20 L110 80 Q110 90 105 95 L65 130 Q60 135 60 135 Q60 135 55 130 L15 95 Q10 90 10 80 Z"/>
            <rect class="shield-cross-v" x="55" y="25" width="10" height="40"/>
            <rect class="shield-cross-h" x="40" y="40" width="40" height="10"/>
            <text class="shield-letters" x="30" y="85">F</text>
            <text class="shield-letters" x="55" y="85">E</text>
            <text class="shield-letters" x="80" y="85">L</text>
        </svg>
        
        <!-- Main text -->
        <div class="main-text">
            Fearfully<br>Made
        </div>
        
        <!-- Bible verse -->
        <div class="verse-text">
            "I am fearfully and wonderfully made"<br>
            <span style="font-size: 140px; opacity: 0.9; font-style: italic;">— Psalm 139:14</span>
        </div>
    </div>
</body>
</html>
