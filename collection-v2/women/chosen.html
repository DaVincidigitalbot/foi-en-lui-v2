<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chosen - Foi en Lui</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 4500px;
            height: 5400px;
            background-color: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .design-container {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .main-text {
            font-family: 'Oswald', sans-serif;
            font-size: 560px;
            font-weight: 700;
            color: #C9A84C;
            text-align: center;
            line-height: 0.8;
            position: relative;
            z-index: 3;
            letter-spacing: 8px;
            text-transform: uppercase;
            text-shadow: 
                4px 4px 0px rgba(0,0,0,0.8),
                8px 8px 4px rgba(0,0,0,0.6),
                -2px -2px 0px rgba(255,255,255,0.1),
                0px 12px 8px rgba(0,0,0,0.4),
                0px 0px 50px rgba(201,168,76,0.4);
            background-image: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 4px,
                rgba(255,255,255,0.04) 4px,
                rgba(255,255,255,0.04) 8px
            );
            -webkit-background-clip: text;
            filter: contrast(1.3) brightness(1.1);
        }
        
        .verse-text {
            font-family: 'Crimson Pro', serif;
            font-size: 160px;
            font-weight: 400;
            color: #E8E8E8;
            text-align: center;
            line-height: 1.3;
            position: absolute;
            bottom: 800px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 4000px;
            z-index: 2;
            text-shadow: 
                2px 2px 0px rgba(0,0,0,0.7),
                4px 4px 2px rgba(0,0,0,0.5),
                0px 4px 3px rgba(0,0,0,0.3);
        }
        
        .shield-integrated {
            position: absolute;
            right: 600px;
            top: 1400px;
            width: 400px;
            height: 480px;
            z-index: 4;
            transform: rotate(15deg);
        }
        
        .shield-bg {
            fill: #C9A84C;
            stroke: #FFFFFF;
            stroke-width: 8;
            filter: drop-shadow(8px 8px 16px rgba(0,0,0,0.6));
        }
        
        .shield-cross-v { fill: #000000; }
        .shield-cross-h { fill: #000000; }
        .shield-letters {
            font-family: 'Oswald', sans-serif;
            font-size: 48px;
            font-weight: bold;
            fill: #000000;
        }
        
        .royal-crown {
            position: absolute;
            top: 800px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 300px;
            opacity: 0.1;
            z-index: 1;
        }
        
        .crown-element {
            fill: #C9A84C;
        }
        
        .premium-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.05;
            z-index: 1;
        }
        
        .premium-line {
            stroke: #C9A84C;
            stroke-width: 8;
            fill: none;
            stroke-linecap: round;
        }
    </style>
</head>
<body>
    <div class="design-container">
        <!-- Premium background lines -->
        <svg class="premium-lines" viewBox="0 0 450 540" xmlns="http://www.w3.org/2000/svg">
            <line class="premium-line" x1="0" y1="135" x2="450" y2="135"/>
            <line class="premium-line" x1="0" y1="270" x2="450" y2="270"/>
            <line class="premium-line" x1="0" y1="405" x2="450" y2="405"/>
            <line class="premium-line" x1="112" y1="0" x2="112" y2="540"/>
            <line class="premium-line" x1="225" y1="0" x2="225" y2="540"/>
            <line class="premium-line" x1="337" y1="0" x2="337" y2="540"/>
        </svg>
        
        <!-- Royal crown -->
        <svg class="royal-crown" viewBox="0 0 240 120" xmlns="http://www.w3.org/2000/svg">
            <polygon class="crown-element" points="20,100 40,60 60,80 80,50 100,70 120,40 140,70 160,50 180,80 200,60 220,100"/>
            <rect class="crown-element" x="20" y="100" width="200" height="20"/>
            <circle cx="60" cy="70" r="8" class="crown-element"/>
            <circle cx="120" cy="50" r="12" class="crown-element"/>
            <circle cx="180" cy="70" r="8" class="crown-element"/>
        </svg>
        
        <!-- Foi en Lui Shield Logo (integrated) -->
        <svg class="shield-integrated" viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg">
            <path class="shield-bg" d="M10 20 Q10 10 20 10 L100 10 Q110 10 110 20 L110 80 Q110 90 105 95 L65 130 Q60 135 60 135 Q60 135 55 130 L15 95 Q10 90 10 80 Z"/>
            <rect class="shield-cross-v" x="55" y="25" width="10" height="40"/>
            <rect class="shield-cross-h" x="40" y="40" width="40" height="10"/>
            <text class="shield-letters" x="30" y="85">F</text>
            <text class="shield-letters" x="55" y="85">E</text>
            <text class="shield-letters" x="80" y="85">L</text>
        </svg>
        
        <!-- Main text -->
        <div class="main-text">
            CHOSEN
        </div>
        
        <!-- Bible verse -->
        <div class="verse-text">
            "But you are a chosen people,<br>a royal priesthood"<br>
            <span style="font-size: 120px; opacity: 0.8; font-weight: 600;">— 1 Peter 2:9</span>
        </div>
    </div>
</body>
</html>
