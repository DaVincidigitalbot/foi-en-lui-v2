<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Plan - Foi en Lui</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 4500px;
            height: 5400px;
            background-color: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .design-container {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .main-text {
            font-family: 'Playfair Display', serif;
            font-size: 380px;
            font-weight: 700;
            color: #C9A84C;
            text-align: center;
            line-height: 0.9;
            position: relative;
            z-index: 3;
            letter-spacing: 8px;
            text-shadow: 
                2px 2px 0px rgba(0,0,0,0.6),
                4px 4px 2px rgba(0,0,0,0.4),
                -1px -1px 0px rgba(255,255,255,0.1),
                0px 6px 4px rgba(0,0,0,0.3),
                0px 0px 20px rgba(201,168,76,0.3);
            background-image: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 3px,
                rgba(255,255,255,0.03) 3px,
                rgba(255,255,255,0.03) 6px
            );
            -webkit-background-clip: text;
            filter: contrast(1.2);
        }
        
        .verse-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 200px;
            font-weight: 400;
            color: #E6D7A8;
            text-align: center;
            line-height: 1.2;
            position: absolute;
            bottom: 400px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 4000px;
            z-index: 2;
            font-style: italic;
            text-shadow: 
                1px 1px 0px rgba(0,0,0,0.4),
                2px 2px 1px rgba(0,0,0,0.3),
                0px 3px 2px rgba(0,0,0,0.2);
        }
        
        .shield-back {
            position: absolute;
            right: 400px;
            top: 800px;
            width: 400px;
            height: 480px;
            z-index: 4;
            transform: rotate(-10deg);
        }
        
        .shield-bg {
            fill: #C9A84C;
            stroke: #1a1a2e;
            stroke-width: 8;
            filter: drop-shadow(8px 8px 16px rgba(0,0,0,0.6));
        }
        
        .shield-cross-v {
            fill: #1a1a2e;
        }
        
        .shield-cross-h {
            fill: #1a1a2e;
        }
        
        .shield-letters {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: bold;
            fill: #1a1a2e;
        }
        
        .ornate-border {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 4200px;
            height: 5000px;
            opacity: 0.08;
            z-index: 1;
        }
        
        .border-element {
            stroke: #C9A84C;
            stroke-width: 6;
            fill: none;
            stroke-linecap: round;
        }
        
        .elegant-flourish {
            position: absolute;
            top: 1000px;
            left: 50%;
            transform: translateX(-50%);
            width: 3000px;
            height: 600px;
            opacity: 0.1;
            z-index: 1;
        }
        
        .flourish-path {
            stroke: #C9A84C;
            stroke-width: 8;
            fill: none;
            stroke-linecap: round;
        }
    </style>
</head>
<body>
    <div class="design-container">
        <!-- Ornate border elements -->
        <svg class="ornate-border" viewBox="0 0 420 500" xmlns="http://www.w3.org/2000/svg">
            <rect class="border-element" x="20" y="20" width="380" height="460" rx="20"/>
            <rect class="border-element" x="40" y="40" width="340" height="420" rx="15"/>
            <line class="border-element" x1="60" y1="60" x2="360" y2="60"/>
            <line class="border-element" x1="60" y1="440" x2="360" y2="440"/>
        </svg>
        
        <!-- Elegant flourish -->
        <svg class="elegant-flourish" viewBox="0 0 300 60" xmlns="http://www.w3.org/2000/svg">
            <path class="flourish-path" d="M50 30 Q100 10 150 30 Q200 50 250 30"/>
            <path class="flourish-path" d="M75 30 Q100 20 125 30"/>
            <path class="flourish-path" d="M175 30 Q200 20 225 30"/>
            <circle cx="150" cy="30" r="8" class="flourish-path"/>
        </svg>
        
        <!-- Foi en Lui Shield Logo (back design) -->
        <svg class="shield-back" viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg">
            <path class="shield-bg" d="M10 20 Q10 10 20 10 L100 10 Q110 10 110 20 L110 80 Q110 90 105 95 L65 130 Q60 135 60 135 Q60 135 55 130 L15 95 Q10 90 10 80 Z"/>
            <rect class="shield-cross-v" x="55" y="25" width="10" height="40"/>
            <rect class="shield-cross-h" x="40" y="40" width="40" height="10"/>
            <text class="shield-letters" x="30" y="85">F</text>
            <text class="shield-letters" x="55" y="85">E</text>
            <text class="shield-letters" x="80" y="85">L</text>
        </svg>
        
        <!-- Main text -->
        <div class="main-text">
            THE<br>PLAN
        </div>
        
        <!-- Bible verse -->
        <div class="verse-text">
            "For I know the plans I have for you,<br>declares the Lord"<br>
            <span style="font-size: 160px; opacity: 0.8; font-style: normal; font-weight: 600;">— Jeremiah 29:11</span>
        </div>
    </div>
</body>
</html>
