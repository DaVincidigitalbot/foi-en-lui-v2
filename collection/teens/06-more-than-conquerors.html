<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Crimson+Text:wght@700;800&display=swap');
* { margin: 0; padding: 0; }
body { 
    width: 4500px; 
    height: 5400px; 
    display: flex; 
    align-items: center; 
    justify-content: center;
    background: transparent;
    text-align: center;
    flex-direction: column;
}
.main-text {
    font-family: 'Crimson Text', serif;
    font-size: 280px;
    font-weight: 800;
    color: #1a1a2e;
    line-height: 0.9;
    text-transform: uppercase;
    letter-spacing: -4px;
    margin-bottom: 100px;
    text-shadow: 
        4px 4px 0px rgba(26, 26, 46, 0.2),
        8px 8px 0px rgba(26, 26, 46, 0.1),
        3px 3px 15px rgba(0,0,0,0.3);
    filter: drop-shadow(3px 3px 8px rgba(0,0,0,0.3));
}
.verse-ref {
    font-family: 'Crimson Text', serif;
    font-size: 130px;
    font-weight: 700;
    color: #C9A84C;
    letter-spacing: 12px;
    text-shadow: 
        3px 3px 0px #8B7355,
        2px 2px 8px rgba(0,0,0,0.3);
}
.streetwear-bold-line {
    width: 1100px;
    height: 14px;
    background: repeating-linear-gradient(
        90deg,
        #1a1a2e 0px,
        #1a1a2e 22px,
        #C9A84C 22px,
        #C9A84C 26px,
        #8B7355 26px,
        #8B7355 30px
    );
    margin: 80px auto;
    border-radius: 7px;
    position: relative;
    box-shadow: 
        inset 0 3px 6px rgba(0,0,0,0.4),
        0 2px 4px rgba(26, 26, 46, 0.5);
}
.streetwear-bold-line::before,
.streetwear-bold-line::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 16px;
    height: 16px;
    background: #1a1a2e;
    border: 2px solid #C9A84C;
    border-radius: 50%;
    transform: translateY(-50%);
    box-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}
.streetwear-bold-line::before { left: -35px; }
.streetwear-bold-line::after { right: -35px; }
</style>
</head>
<body>
<div class="main-text">MORE THAN<br>CONQUERORS</div>
<div class="streetwear-bold-line"></div>
<div class="verse-ref">ROMANS 8:37</div>
</body>
</html>
