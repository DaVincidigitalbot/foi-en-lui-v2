<svg xmlns="http://www.w3.org/2000/svg" width="200" height="240" viewBox="0 0 200 240">
  <!-- Shield shape -->
  <path d="M100 10 L180 50 L180 130 Q180 180 100 230 Q20 180 20 130 L20 50 Z" 
        fill="#F5F0E8" stroke="#1a1a2e" stroke-width="4"/>
  
  <!-- Gold cross -->
  <rect x="90" y="50" width="20" height="120" fill="#C9A84C"/>
  <rect x="50" y="100" width="100" height="20" fill="#C9A84C"/>
  
  <!-- Letters F, E, L -->
  <text x="70" y="80" font-family="serif" font-size="24" font-weight="bold" fill="#1a1a2e">F</text>
  <text x="100" y="160" font-family="serif" font-size="24" font-weight="bold" fill="#1a1a2e">E</text>
  <text x="130" y="80" font-family="serif" font-size="24" font-weight="bold" fill="#1a1a2e">L</text>
</svg>