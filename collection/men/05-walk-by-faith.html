<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600&display=swap');
* { margin: 0; padding: 0; }
body { 
    width: 4500px; 
    height: 5400px; 
    display: flex; 
    align-items: center; 
    justify-content: center;
    background: transparent;
    text-align: center;
    flex-direction: column;
}
.main-text {
    font-family: 'Crimson Text', serif;
    font-size: 350px;
    font-weight: 600;
    color: #F5F0E8;
    line-height: 0.95;
    text-transform: uppercase;
    letter-spacing: -4px;
    margin-bottom: 100px;
    text-shadow: 
        3px 3px 0px rgba(245, 240, 232, 0.2),
        6px 6px 0px rgba(245, 240, 232, 0.1),
        2px 2px 12px rgba(26, 26, 46, 0.6);
    filter: drop-shadow(2px 2px 8px rgba(0,0,0,0.4));
}
.verse-ref {
    font-family: 'Crimson Text', serif;
    font-size: 120px;
    font-weight: 400;
    color: #C9A84C;
    letter-spacing: 10px;
    text-shadow: 
        2px 2px 0px #8B7355,
        1px 1px 6px rgba(0,0,0,0.2);
}
.modern-clean-line {
    width: 700px;
    height: 6px;
    background: linear-gradient(
        90deg,
        transparent 0%,
        #C9A84C 25%,
        #C9A84C 75%,
        transparent 100%
    );
    margin: 80px auto;
    border-radius: 3px;
    position: relative;
}
.modern-clean-line::before,
.modern-clean-line::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 8px;
    height: 8px;
    background: #C9A84C;
    border-radius: 50%;
    transform: translateY(-50%);
    box-shadow: 1px 1px 0px #8B7355;
}
.modern-clean-line::before { left: 50px; }
.modern-clean-line::after { right: 50px; }
</style>
</head>
<body>
<div class="main-text">WALK BY<br>FAITH</div>
<div class="modern-clean-line"></div>
<div class="verse-ref">2 CORINTHIANS 5:7</div>
</body>
</html>
