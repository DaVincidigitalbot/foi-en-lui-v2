<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Crimson+Text:wght@600;700&display=swap');
* { margin: 0; padding: 0; }
body { 
    width: 4500px; 
    height: 5400px; 
    display: flex; 
    align-items: center; 
    justify-content: center;
    background: transparent;
    text-align: center;
    flex-direction: column;
    position: relative;
}
.shield-cross-emblem {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 720px;
    background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="240" viewBox="0 0 200 240"><path d="M100 10 L180 50 L180 130 Q180 180 100 230 Q20 180 20 130 L20 50 Z" fill="none" stroke="%23C9A84C" stroke-width="8" opacity="0.3"/><rect x="90" y="50" width="20" height="120" fill="%23C9A84C" opacity="0.4"/><rect x="50" y="100" width="100" height="20" fill="%23C9A84C" opacity="0.4"/></svg>') no-repeat center;
    background-size: contain;
    z-index: 1;
    opacity: 0.7;
}
.main-text {
    font-family: 'Crimson Text', serif;
    font-size: 300px;
    font-weight: 700;
    color: #F5F0E8;
    line-height: 0.9;
    text-transform: uppercase;
    letter-spacing: -6px;
    position: relative;
    z-index: 2;
    text-shadow: 
        4px 4px 0px rgba(245, 240, 232, 0.2),
        8px 8px 0px rgba(245, 240, 232, 0.1),
        3px 3px 15px rgba(26, 26, 46, 0.6);
    filter: drop-shadow(3px 3px 10px rgba(0,0,0,0.5));
}
.verse-ref {
    font-family: 'Crimson Text', serif;
    font-size: 120px;
    font-weight: 600;
    color: #C9A84C;
    letter-spacing: 8px;
    margin-top: 100px;
    position: relative;
    z-index: 2;
    text-shadow: 
        3px 3px 0px #8B7355,
        2px 2px 8px rgba(0,0,0,0.3);
}
.armor-stitching {
    width: 1000px;
    height: 14px;
    background: repeating-linear-gradient(
        90deg,
        #C9A84C 0px,
        #C9A84C 22px,
        #8B7355 22px,
        #8B7355 26px,
        #1a1a2e 26px,
        #1a1a2e 30px
    );
    margin: 80px auto;
    border-radius: 7px;
    position: relative;
    z-index: 2;
    box-shadow: 
        inset 0 2px 4px rgba(0,0,0,0.3),
        0 2px 4px rgba(201, 168, 76, 0.3);
}
</style>
</head>
<body>
<div class="shield-cross-emblem"></div>
<div class="main-text">PUT ON THE<br>ARMOR<br>OF GOD</div>
<div class="armor-stitching"></div>
<div class="verse-ref">EPHESIANS 6:11</div>
</body>
</html>
