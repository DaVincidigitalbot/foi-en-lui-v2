<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600&display=swap');
* { margin: 0; padding: 0; }
body { 
    width: 4500px; 
    height: 5400px; 
    display: flex; 
    align-items: center; 
    justify-content: center;
    background: transparent;
    text-align: center;
    flex-direction: column;
}
.main-text {
    font-family: 'Crimson Text', serif;
    font-size: 380px;
    font-weight: 600;
    color: #1a1a2e;
    line-height: 1;
    margin-bottom: 100px;
    letter-spacing: -8px;
    text-shadow: 
        2px 2px 0px rgba(26, 26, 46, 0.15),
        4px 4px 0px rgba(26, 26, 46, 0.1),
        1px 1px 6px rgba(0,0,0,0.2);
    filter: drop-shadow(1px 1px 3px rgba(0,0,0,0.15));
}
.verse-ref {
    font-family: 'Crimson Text', serif;
    font-size: 100px;
    font-weight: 400;
    color: #C9A84C;
    letter-spacing: 10px;
    text-shadow: 
        2px 2px 0px #8B7355,
        1px 1px 4px rgba(0,0,0,0.2);
}
.stitch-circle {
    width: 120px;
    height: 120px;
    border: 5px dashed #C9A84C;
    border-radius: 50%;
    margin: 70px auto;
    position: relative;
}
.stitch-circle::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 20px;
    height: 20px;
    background: #C9A84C;
    border-radius: 50%;
    box-shadow: 
        2px 2px 0px #8B7355,
        1px 1px 4px rgba(0,0,0,0.2);
}
</style>
</head>
<body>
<div class="main-text">BE STILL</div>
<div class="stitch-circle"></div>
<div class="verse-ref">PSALM 46:10</div>
</body>
</html>
