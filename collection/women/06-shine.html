<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Crimson+Text:wght@600;700&display=swap');
* { margin: 0; padding: 0; }
body { 
    width: 4500px; 
    height: 5400px; 
    display: flex; 
    align-items: center; 
    justify-content: center;
    background: transparent;
    text-align: center;
    flex-direction: column;
    position: relative;
}
.main-text {
    font-family: 'Crimson Text', serif;
    font-size: 520px;
    font-weight: 700;
    color: #C9A84C;
    line-height: 1;
    letter-spacing: 15px;
    text-shadow: 
        4px 4px 0px #8B7355,
        8px 8px 0px rgba(139, 115, 85, 0.5),
        3px 3px 15px rgba(26, 26, 46, 0.3);
    filter: drop-shadow(3px 3px 8px rgba(0,0,0,0.2));
    position: relative;
}
.verse-ref {
    font-family: 'Crimson Text', serif;
    font-size: 120px;
    color: #1a1a2e;
    letter-spacing: 10px;
    margin-top: 100px;
    text-shadow: 
        2px 2px 0px rgba(26, 26, 46, 0.15),
        1px 1px 6px rgba(0,0,0,0.2);
}
.golden-threads {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: radial-gradient(
        circle at 50% 50%,
        rgba(201, 168, 76, 0.15) 0%,
        rgba(201, 168, 76, 0.08) 30%,
        transparent 60%
    );
    pointer-events: none;
}
.embroidery-halo {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    width: 2200px;
    height: 400px;
    border: 8px dashed rgba(201, 168, 76, 0.3);
    border-radius: 50%;
    z-index: -1;
}
</style>
</head>
<body>
<div class="golden-threads"></div>
<div class="embroidery-halo"></div>
<div class="main-text">SHINE</div>
<div class="verse-ref">MATTHEW 5:16</div>
</body>
</html>
