<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600&display=swap');
* { margin: 0; padding: 0; }
body { 
    width: 4500px; 
    height: 5400px; 
    display: flex; 
    align-items: center; 
    justify-content: center;
    background: transparent;
    text-align: center;
    flex-direction: column;
    position: relative;
}
.shield-main {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 400px;
    height: 480px;
    background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="240" viewBox="0 0 200 240"><path d="M100 10 L180 50 L180 130 Q180 180 100 230 Q20 180 20 130 L20 50 Z" fill="%23F5F0E8" stroke="%231a1a2e" stroke-width="4"/><rect x="90" y="50" width="20" height="120" fill="%23C9A84C"/><rect x="50" y="100" width="100" height="20" fill="%23C9A84C"/><text x="70" y="80" font-family="serif" font-size="24" font-weight="bold" fill="%231a1a2e">F</text><text x="100" y="160" font-family="serif" font-size="24" font-weight="bold" fill="%231a1a2e">E</text><text x="130" y="80" font-family="serif" font-size="24" font-weight="bold" fill="%231a1a2e">L</text></svg>') no-repeat center;
    background-size: contain;
    z-index: 1;
}
.main-text {
    font-family: 'Crimson Text', serif;
    font-size: 420px;
    font-weight: 600;
    color: #F5F0E8;
    line-height: 1;
    margin-bottom: 120px;
    letter-spacing: -8px;
    z-index: 2;
    position: relative;
    text-shadow: 
        4px 4px 0px rgba(245, 240, 232, 0.2),
        8px 8px 0px rgba(245, 240, 232, 0.1),
        3px 3px 15px rgba(0,0,0,0.6);
    filter: drop-shadow(2px 2px 8px rgba(0,0,0,0.4));
}
.verse-ref {
    font-family: 'Crimson Text', serif;
    font-size: 100px;
    font-weight: 400;
    color: #C9A84C;
    letter-spacing: 15px;
    text-transform: uppercase;
    z-index: 2;
    position: relative;
    text-shadow: 
        2px 2px 0px #8B7355,
        1px 1px 6px rgba(0,0,0,0.2);
}
.minimal-stitch {
    width: 300px;
    height: 5px;
    background: repeating-linear-gradient(
        90deg,
        #C9A84C 0px,
        #C9A84C 12px,
        transparent 12px,
        transparent 16px
    );
    margin: 80px auto;
    border-radius: 3px;
    z-index: 2;
    position: relative;
}
</style>
</head>
<body>
<div class="shield-main"></div>
<div class="main-text">CHOSEN</div>
<div class="minimal-stitch"></div>
<div class="verse-ref">1 PETER 2:9</div>
</body>
</html>
