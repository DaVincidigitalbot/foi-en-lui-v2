<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600&display=swap');
* { margin: 0; padding: 0; }
body { 
    width: 4500px; 
    height: 5400px; 
    display: flex; 
    align-items: center; 
    justify-content: center;
    background: transparent;
    text-align: center;
    flex-direction: column;
}
.stacked-text {
    font-family: 'Crimson Text', serif;
    font-weight: 600;
    color: #F5F0E8;
    line-height: 0.75;
    text-shadow: 
        3px 3px 0px rgba(245, 240, 232, 0.2),
        6px 6px 0px rgba(245, 240, 232, 0.1),
        2px 2px 10px rgba(26, 26, 46, 0.5);
    filter: drop-shadow(2px 2px 6px rgba(0,0,0,0.3));
}
.grace1 {
    font-size: 320px;
    margin-bottom: -40px;
}
.upon {
    font-size: 150px;
    color: #C9A84C;
    font-style: italic;
    margin-bottom: -40px;
    text-shadow: 
        2px 2px 0px #8B7355,
        1px 1px 6px rgba(0,0,0,0.2);
}
.grace2 {
    font-size: 320px;
    margin-bottom: 80px;
}
.verse-ref {
    font-family: 'Crimson Text', serif;
    font-size: 110px;
    font-weight: 400;
    color: #C9A84C;
    letter-spacing: 6px;
    font-style: italic;
    text-shadow: 
        2px 2px 0px #8B7355,
        1px 1px 6px rgba(0,0,0,0.2);
}
.elegant-stitching {
    width: 500px;
    height: 4px;
    background: repeating-linear-gradient(
        90deg,
        #C9A84C 0px,
        #C9A84C 8px,
        transparent 8px,
        transparent 12px
    );
    margin: 60px auto;
    border-radius: 2px;
    position: relative;
}
.elegant-stitching::before,
.elegant-stitching::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 6px;
    height: 6px;
    background: #C9A84C;
    border-radius: 50%;
    transform: translateY(-50%);
    box-shadow: 1px 1px 0px #8B7355;
}
.elegant-stitching::before { left: -15px; }
.elegant-stitching::after { right: -15px; }
</style>
</head>
<body>
<div class="stacked-text">
    <div class="grace1">GRACE</div>
    <div class="upon">upon</div>
    <div class="grace2">GRACE</div>
</div>
<div class="elegant-stitching"></div>
<div class="verse-ref">John 1:16</div>
</body>
</html>
