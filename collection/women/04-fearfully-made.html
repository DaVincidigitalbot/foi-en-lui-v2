<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600&display=swap');
* { margin: 0; padding: 0; }
body { 
    width: 4500px; 
    height: 5400px; 
    display: flex; 
    align-items: center; 
    justify-content: center;
    background: transparent;
    text-align: center;
    flex-direction: column;
    position: relative;
}
.main-text {
    font-family: 'Crimson Text', serif;
    font-size: 280px;
    font-weight: 600;
    color: #1a1a2e;
    line-height: 0.95;
    margin-bottom: 80px;
    position: relative;
    z-index: 2;
    text-shadow: 
        2px 2px 0px rgba(26, 26, 46, 0.15),
        4px 4px 0px rgba(26, 26, 46, 0.1),
        1px 1px 8px rgba(0,0,0,0.2);
    filter: drop-shadow(1px 1px 4px rgba(0,0,0,0.15));
}
.verse-ref {
    font-family: 'Crimson Text', serif;
    font-size: 110px;
    font-weight: 400;
    color: #C9A84C;
    letter-spacing: 8px;
    z-index: 2;
    position: relative;
    text-shadow: 
        2px 2px 0px #8B7355,
        1px 1px 5px rgba(0,0,0,0.2);
}
.floral-embroidery {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 1800px;
    height: 1800px;
    border: 12px dashed rgba(201, 168, 76, 0.2);
    border-radius: 50%;
    z-index: 1;
}
.floral-embroidery::before {
    content: '';
    position: absolute;
    top: -30px;
    left: -30px;
    right: -30px;
    bottom: -30px;
    border: 6px dotted rgba(201, 168, 76, 0.15);
    border-radius: 50%;
}
.stitch-dots {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
}
.stitch-dots::after {
    content: '';
    position: absolute;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
    width: 15px;
    height: 15px;
    background: rgba(201, 168, 76, 0.4);
    border-radius: 50%;
    box-shadow: 
        0 200px 0 rgba(201, 168, 76, 0.4),
        0 400px 0 rgba(201, 168, 76, 0.4),
        0 600px 0 rgba(201, 168, 76, 0.4);
}
</style>
</head>
<body>
<div class="floral-embroidery">
    <div class="stitch-dots"></div>
</div>
<div class="main-text">FEARFULLY &amp;<br>WONDERFULLY<br>MADE</div>
<div class="verse-ref">PSALM 139:14</div>
</body>
</html>
