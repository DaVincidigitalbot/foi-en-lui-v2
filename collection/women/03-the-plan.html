<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Crimson+Text:wght@600;700&display=swap');
* { margin: 0; padding: 0; }
body { 
    width: 4500px; 
    height: 5400px; 
    display: flex; 
    align-items: center; 
    justify-content: center;
    background: transparent;
    text-align: center;
    flex-direction: column;
}
.verse-text {
    font-family: 'Crimson Text', serif;
    font-size: 240px;
    font-weight: 700;
    color: #F5F0E8;
    line-height: 0.9;
    margin-bottom: 80px;
    text-shadow: 
        3px 3px 0px rgba(245, 240, 232, 0.3),
        6px 6px 0px rgba(245, 240, 232, 0.2),
        2px 2px 10px rgba(26, 26, 46, 0.5);
    filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.3));
}
.verse-ref {
    font-family: 'Crimson Text', serif;
    font-size: 120px;
    font-weight: 600;
    color: #C9A84C;
    letter-spacing: 6px;
    font-style: italic;
    text-shadow: 
        2px 2px 0px #8B7355,
        1px 1px 6px rgba(0,0,0,0.2);
}
.embroidery-border {
    width: 700px;
    height: 10px;
    background: repeating-linear-gradient(
        90deg,
        #C9A84C 0px,
        #C9A84C 15px,
        transparent 15px,
        transparent 20px
    );
    margin: 70px auto;
    border-radius: 5px;
    position: relative;
}
.embroidery-border::before,
.embroidery-border::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 8px;
    height: 8px;
    background: #C9A84C;
    border-radius: 50%;
    transform: translateY(-50%);
}
.embroidery-border::before { left: -20px; }
.embroidery-border::after { right: -20px; }
</style>
</head>
<body>
<div class="verse-text">I KNOW THE<br>PLANS I HAVE<br>FOR YOU</div>
<div class="embroidery-border"></div>
<div class="verse-ref">Jeremiah 29:11</div>
</body>
</html>
